<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent;
      width: 220px;
      height: 240px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #pet-container {
      position: relative;
      width: 220px;
      height: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 10px;
    }

    #guilt-msg {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.92);
      border: 1.5px solid #e8632a;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #e8632a;
      white-space: nowrap;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: none;
    }

    #guilt-msg.visible { display: block; }

    #lottie-container {
      width: 180px;
      height: 180px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #pet-progress-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
    }

    #pet-progress-wrap.visible { display: flex; }

    #pet-label {
      font-size: 12px;
      color: rgba(255,255,255,0.9);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 600;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    #pet-progress-bar {
      width: 160px;
      height: 8px;
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
      overflow: hidden;
    }

    #pet-progress-fill {
      height: 100%;
      width: 0%;
      background: #e8632a;
      border-radius: 4px;
      transition: width 0.1s ease;
    }
  </style>
</head>
<body>

  <div id="pet-container">
    <div id="guilt-msg"></div>
    <div id="lottie-container"></div>
    <div id="pet-progress-wrap">
      <span id="pet-label">pet me...</span>
      <div id="pet-progress-bar">
        <div id="pet-progress-fill"></div>
      </div>
    </div>
  </div>

  <script src="../node_modules/lottie-web/build/player/lottie.min.js"></script>
  <script src="../src/overlay.js"></script>
</body>
</html>
